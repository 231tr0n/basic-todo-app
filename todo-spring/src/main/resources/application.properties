jwt.secret=todo
jwt.expiry=86400
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG
logging.level.org.springframework.jdbc.core.StatementCreatorUtils=TRACE
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=*
management.health.circuitbreakers.enabled=true
resilience4j.circuitbreaker.instances.todo-service.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.todo-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.todo-service.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.todo-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.todo-service.register-health-indicator=true
resilience4j.circuitbreaker.instances.todo-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.todo-service.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.todo-service.wait-duration-in-open-state=5s
server.host=localhost
server.port=9000
spring.application.name=todo
spring.datasource.password=todo
spring.datasource.url=jdbc:mariadb://localhost:3306/todo
spring.datasource.username=todo
spring.jpa.properties.hibernate.format_sql=true
