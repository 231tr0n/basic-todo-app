<div class="user-signing-container">
	@if (user === null) {
		<mat-card class="example-card" appearance="outlined">
			<mat-card-content>
				<mat-tab-group>
					<mat-tab label="Sign In">
						<div class="tab-padding">
							<app-signin />
						</div>
					</mat-tab>
					<mat-tab label="Sign Up">
						<div class="tab-padding">
							<app-signup />
						</div>
					</mat-tab>
				</mat-tab-group>
			</mat-card-content>
		</mat-card>
	}
</div>
