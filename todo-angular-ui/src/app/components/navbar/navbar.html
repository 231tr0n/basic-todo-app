<mat-toolbar class="flex-spacer">
	<span>Angular Todo UI</span>
	<span>
		<button type="button" matMiniFab (click)="toggleMode()">
			@if (darkMode) {
				<mat-icon>dark_mode</mat-icon>
			} @else {
				<mat-icon>light_mode</mat-icon>
			}
		</button>
		<button type="button" matMiniFab>
			<mat-icon>account_circle</mat-icon>
		</button>
	</span>
</mat-toolbar>
